server:
  port: 8084 # Porta para o servico-service

spring:
  application:
    name: servico-service # Nome que será registrado no Eureka
  datasource:
    url: jdbc:h2:mem:servicosdb;DATABASE_TO_UPPER=FALSE # Banco de dados em memória específico para este serviço
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console-servicos # Caminho único para o console H2 deste serviço
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # database-platform: org.hibernate.dialect.PostgreSQLDialect # Para quando for usar PostgreSQL

# Chave secreta para validação do JWT (mesma dos outros serviços)
jwt:
  secret:
    key: NDAzZjU5YTgtYmI4YS00YjU5LTg5ODYtZGIxYzg4Y2E4N2ZlCg== # Use a SUA chave secreta aqui

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true # Mantido do seu exemplo YAML

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics # Expondo endpoints básicos do Actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
   org.springframework.security: DEBUG  # Para ver mais detalhes do Spring Security
   br.com.naildesigner.servico_service.config.JwtAuthFilter: TRACE  # Ajuste para sua classe JwtAuthFilter
   br.com.naildesigner.servico_service.services.JwtService: TRACE   # Ajuste para sua classe JwtService
   org.springframework.web: DEBUG  # Para ver detalhes do Spring Web MVC
   # feign.Logger: DEBUG  # Se quiser ver logs do Feign, mas precisa configurar um Feign Logger Bean			

