# --- Configuração do Servidor ---
# Porta única para o serviço de agendamento
server.port=8083
spring.application.name=agendamento-service-AgendeNail

# --- Configuração do Banco de Dados H2 ---
# A flag ';DATABASE_TO_UPPER=FALSE' é crucial para evitar problemas com nomes de tabelas no H2.
spring.datasource.url=jdbc:h2:mem:agendamentosdb;DATABASE_TO_UPPER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Configuração do JPA/Hibernate ---
# Garante que as tabelas 'agendamentos' e 'bloqueio_horario' sejam criadas ou atualizadas.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Console H2 ---
# Permite que você aceda ao banco de dados pelo navegador para depuração.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console-agendamentos

# --- PONTO CRÍTICO: Configuração de Segurança JWT ---
# Esta chave DEVE ser IDÊNTICA à do auth-service e do api-gateway.
jwt.secret.key=NDAzZjU5YTgtYmI4YS00YjU5LTg5ODYtZGIxYzg4Y2E4N2ZlCg==

# --- Configuração do Eureka Client ---
# Diz ao serviço como se encontrar e se registar no Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- Logging para ajudar a depurar ---
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
